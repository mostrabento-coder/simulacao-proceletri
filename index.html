<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Física - Final Fix</title>
    <style>
        /* Bloqueio de rolagem e seleção */
        html, body { 
            position: fixed; overflow: hidden; width: 100%; height: 100%; 
            margin: 0; padding: 0; background: #0f172a; font-family: sans-serif;
        }

        /* Container que agrupa tudo e evita que o rodapé suma */
        .app-wrapper {
            display: flex; flex-direction: column;
            height: 100%; width: 100%;
            padding: 5px;
        }

        /* Menu de abas menores para caber em telas estreitas */
        .tabs { 
            display: flex; gap: 3px; margin-bottom: 5px; height: 45px; flex-shrink: 0;
        }
        .tab { 
            flex: 1; border: none; border-radius: 5px; background: #334155; 
            color: #fff; font-size: 10px; font-weight: bold; text-transform: uppercase;
        }
        .tab.active { background: #fbbf24; color: #000; }

        /* Área do Palco - Ajustada para ser menor e sempre visível */
        #palco { 
            flex-grow: 1; background: #000; border: 2px solid #334155; 
            border-radius: 10px; position: relative; touch-action: none;
            margin-bottom: 5px;
        }

        /* Painel de Controle - Onde fica o Reset */
        .controls {
            height: 120px; background: #1e293b; border-radius: 10px;
            padding: 10px; flex-shrink: 0; border-bottom: 4px solid #fbbf24;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* Botão de Reset Grande para o Polegar */
        .btn-reset {
            background: #475569; color: white; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; font-size: 14px; width: 100%;
        }

        /* Objetos de Interação */
        .obj { 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            border: 2px solid #fff; z-index: 10; font-weight: bold;
        }
        .esfera { width: 50px; height: 50px; border-radius: 50%; }
        .retangulo { width: 80px; height: 30px; border-radius: 4px; }
        
        .label { 
            position: absolute; top: -22px; font-size: 10px; color: #fbbf24;
            background: rgba(0,0,0,0.8); padding: 1px 4px; border-radius: 3px;
        }

        h2 { font-size: 14px; margin: 0; color: #fbbf24; }
        p { font-size: 11px; margin: 2px 0; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="tabs">
        <button class="tab active" id="t-atrito" onclick="setModo('atrito')">Atrito</button>
        <button class="tab" id="t-contato" onclick="setModo('contato')">Contato</button>
        <button class="tab" id="t-inducao" onclick="setModo('inducao')">Indução</button>
    </div>

    <div id="palco"></div>

    <div class="controls">
        <div>
            <h2 id="title">Atrito</h2>
            <p id="desc">Arraste os itens.</p>
        </div>
        <button class="btn-reset" onclick="init()">🔄 REINICIAR</button>
    </div>
</div>

<script>
    let modo = 'atrito', ativo = null, offset = {x:0, y:0}, dist = 0, lastX = 0;

    function setModo(m) {
        modo = m;
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.getElementById('t-'+m).classList.add('active');
        init();
    }

    function create(id, xP, yP, type, color, q, txt) {
        const p = document.getElementById('palco');
        const d = document.createElement('div');
        d.id = id; d.className = 'obj ' + type;
        d.style.backgroundColor = color;
        d.dataset.q = q;
        p.appendChild(d);

        // Posicionamento
        const r = p.getBoundingClientRect();
        d.style.left = (r.width * xP / 100) + 'px';
        d.style.top = (r.height * yP / 100) + 'px';

        d.innerHTML = `<div class="label">${txt}</div><span>${q!=0?(q>0?'+'+q:q):''}</span>`;
        d.ontouchstart = d.onmousedown = start;
    }

    function init() {
        const p = document.getElementById('palco');
        p.innerHTML = ''; dist = 0;
        const T = document.getElementById('title'), D = document.getElementById('desc');

        if(modo==='atrito'){
            T.innerText="⚡ Atrito"; D.innerText="Esfregue o balão no casaco.";
            create('o1', 10, 30, 'retangulo', '#64748b', 0, 'CASACO');
            create('o2', 60, 30, 'esfera', '#475569', 0, 'BALÃO');
        } else if(modo==='contato'){
            T.innerText="⚡ Contato"; D.innerText="Toque a esfera (+) na (0).";
            create('o1', 15, 35, 'esfera', '#ef4444', 10, '+10');
            create('o2', 65, 35, 'esfera', '#64748b', 0, '0');
        } else {
            T.innerText="⚡ Indução"; D.innerText="Aproxime o bastão da esfera.";
            create('o1', 5, 40, 'retangulo', '#3b82f6', -10, 'BASTÃO');
            create('o2', 70, 35, 'esfera', '#64748b', 0, 'NEUTRA');
        }
    }

    function start(e) {
        if(e.cancelable) e.preventDefault();
        ativo = this;
        const ev = e.type.includes('touch') ? e.touches[0] : e;
        const r = ativo.getBoundingClientRect();
        offset = { x: ev.clientX - r.left, y: ev.clientY - r.top };
        lastX = ev.clientX;
        ativo.style.zIndex = 100;
        window.onmousemove = window.ontouchmove = move;
        window.onmouseup = window.ontouchend = stop;
    }

    function move(e) {
        if(!ativo) return;
        const ev = e.type.includes('touch') ? e.touches[0] : e;
        const p = document.getElementById('palco').getBoundingClientRect();
        let x = ev.clientX - p.left - offset.x, y = ev.clientY - p.top - offset.y;
        x = Math.max(0, Math.min(x, p.width - ativo.offsetWidth));
        y = Math.max(0, Math.min(y, p.height - ativo.offsetHeight));
        ativo.style.left = x + 'px'; ativo.style.top = y + 'px';
        if(modo==='atrito') dist += Math.abs(ev.clientX - lastX);
        lastX = ev.clientX;
        check();
    }

    function stop() { if(ativo) ativo.style.zIndex = 10; ativo = null; }

    function check() {
        const o1 = document.getElementById('o1'), o2 = document.getElementById('o2');
        if(!o1 || !o2) return;
        const r1 = o1.getBoundingClientRect(), r2 = o2.getBoundingClientRect();
        const hit = !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);

        if(modo==='atrito' && hit && dist > 700){
            o1.style.backgroundColor='#ef4444'; o1.querySelector('.label').innerText='+5';
            o2.style.backgroundColor='#3b82f6'; o2.querySelector('.label').innerText='-5';
            document.getElementById('desc').innerText="✅ Eletrizados!";
        }
        if(modo==='contato' && hit){
            let m = (parseFloat(o1.dataset.q) + parseFloat(o2.dataset.q)) / 2;
            o1.dataset.q = o2.dataset.q = m;
            o1.style.backgroundColor = o2.style.backgroundColor = '#f97316';
            o1.querySelector('.label').innerText = o2.querySelector('.label').innerText = m.toFixed(1);
            document.getElementById('desc').innerText="✅ Cargas divididas!";
        }
        if(modo==='inducao'){
            const d = Math.abs((r1.left + r1.width/2) - (r2.left + r2.width/2));
            if(d < 90) {
                o2.innerHTML = `<div class="label">POLARIZADA</div><div style="display:flex;gap:5px"><span>+</span><span>-</span></div>`;
                o2.style.borderColor = '#fbbf24';
            } else {
                o2.innerHTML = `<div class="label">NEUTRA</div>`; o2.style.borderColor = '#fff';
            }
        }
    }
    window.onload = init;
</script>
</body>
</html>
