<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Eletrização - Mobile Ready</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        :root { --fundo: #0f172a; --card: #1e293b; --acento: #fbbf24; }
        body { 
            background: var(--fundo); 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px;
            overflow: hidden; /* Evita scroll lateral indesejado */
        }
        
        .menu { display: flex; width: 100%; max-width: 800px; gap: 5px; margin-top: 10px; z-index: 100; }
        .tab { flex: 1; padding: 12px 5px; border: none; background: #334155; color: #94a3b8; cursor: pointer; border-radius: 8px 8px 0 0; font-weight: bold; font-size: 0.8rem; }
        .tab.ativa { background: var(--card); color: var(--acento); border-bottom: 3px solid var(--acento); }

        .container { width: 100%; max-width: 800px; background: var(--card); padding: 15px; border-radius: 0 0 15px 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .palco { 
            height: 400px; 
            background: #000; 
            border-radius: 10px; 
            position: relative; 
            border: 2px solid #334155; 
            overflow: hidden; 
            touch-action: none;
        }
        
        .obj { 
            position: absolute; 
            cursor: grab; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            touch-action: none; /* CRÍTICO PARA MOBILE */
            will-change: transform, left, top;
        }
        
        .esfera { width: 70px; height: 70px; border-radius: 50%; }
        .retangulo { width: 110px; height: 40px; border-radius: 8px; }
        
        .instrucoes { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 4px solid var(--acento); font-size: 0.9rem; }
        .carga-txt { position: absolute; top: -28px; width: 120%; left: -10%; text-align: center; color: var(--acento); font-family: monospace; font-size: 12px; font-weight: bold; background: rgba(0,0,0,0.7); border-radius: 5px; padding: 2px; pointer-events: none; }
        
        button.reset { width: 100%; padding: 12px; background: #475569; color: white; border: none; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="menu">
        <button id="btn-atrito" class="tab ativa" onclick="mudarModo('atrito')">ATRITO</button>
        <button id="btn-contato" class="tab" onclick="mudarModo('contato')">CONTATO</button>
        <button id="btn-inducao" class="tab" onclick="mudarModo('inducao')">INDUÇÃO</button>
    </div>

    <div class="container">
        <div class="palco" id="palco"></div>
        <div class="instrucoes">
            <h3 id="titulo" style="margin:0 0 5px 0; font-size: 1.1rem;">Atrito</h3>
            <p id="texto" style="margin:0">Carregando...</p>
            <button class="reset" onclick="resetar()">🔄 Reiniciar Simulação</button>
        </div>
    </div>

<script>
    let modo = 'atrito';
    let ativo = null;
    let offset = { x: 0, y: 0 };
    let distanciaPercorrida = 0;
    let ultimaX = 0;

    function mudarModo(m) {
        modo = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativa'));
        document.getElementById('btn-' + m).classList.add('ativa');
        resetar();
    }

    function resetar() {
        const palco = document.getElementById('palco');
        palco.innerHTML = '';
        distanciaPercorrida = 0;

        if(modo === 'atrito') {
            document.getElementById('titulo').innerText = "⚡ Atrito";
            document.getElementById('texto').innerText = "Esfregue o BALÃO contra o CASACO rapidamente.";
            criarObj('obj1', 40, 150, 'retangulo', '#64748b', 0, 'CASACO');
            criarObj('obj2', 200, 140, 'esfera', '#475569', 0, 'BALÃO');
        } 
        else if(modo === 'contato') {
            document.getElementById('titulo').innerText = "⚡ Contato";
            document.getElementById('texto').innerText = "Encoste a esfera (+) na esfera neutra.";
            criarObj('obj1', 40, 150, 'esfera', '#ef4444', 10, '+10');
            criarObj('obj2', 200, 150, 'esfera', '#64748b', 0, '0');
        }
        else if(modo === 'inducao') {
            document.getElementById('titulo').innerText = "⚡ Indução";
            document.getElementById('texto').innerText = "Aproxime o bastão (-) da esfera sem tocar.";
            criarObj('obj1', 30, 160, 'retangulo', '#3b82f6', -10, '- - -');
            criarObj('obj2', 220, 150, 'esfera', '#64748b', 0, 'NEUTRA');
        }
    }

    function criarObj(id, x, y, classe, cor, carga, txt) {
        const div = document.createElement('div');
        div.id = id;
        div.className = 'obj ' + classe;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.backgroundColor = cor;
        div.dataset.q = carga;
        
        const label = carga === 0 ? '' : (carga > 0 ? '+' + carga : carga);
        div.innerHTML = `<div class="carga-txt">${txt}</div><span id="val-${id}">${label}</span>`;
        
        // Eventos para Mouse e Touch
        div.addEventListener('mousedown', iniciarArrasto);
        div.addEventListener('touchstart', iniciarArrasto, {passive: false});
        
        document.getElementById('palco').appendChild(div);
    }

    function iniciarArrasto(e) {
        e.preventDefault();
        ativo = this;
        ativo.style.zIndex = 1000;
        
        const rect = ativo.getBoundingClientRect();
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        
        offset.x = clientX - rect.left;
        offset.y = clientY - rect.top;
        ultimaX = clientX;

        window.addEventListener('mousemove', moverArrasto);
        window.addEventListener('touchmove', moverArrasto, {passive: false});
        window.addEventListener('mouseup', pararArrasto);
        window.addEventListener('touchend', pararArrasto);
    }

    function moverArrasto(e) {
        if (!ativo) return;
        if (e.type === 'touchmove') e.preventDefault();

        const palco = document.getElementById('palco');
        const pRect = palco.getBoundingClientRect();
        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

        let x = clientX - pRect.left - offset.x;
        let y = clientY - pRect.top - offset.y;

        // Limites do palco
        x = Math.max(0, Math.min(x, pRect.width - ativo.offsetWidth));
        y = Math.max(0, Math.min(y, pRect.height - ativo.offsetHeight));

        ativo.style.left = x + 'px';
        ativo.style.top = y + 'px';

        // Lógica de Atrito
        if (modo === 'atrito') {
            distanciaPercorrida += Math.abs(clientX - ultimaX);
            ultimaX = clientX;
        }

        verificarFisica();
    }

    function pararArrasto() {
        if (ativo) ativo.style.zIndex = 10;
        ativo = null;
        window.removeEventListener('mousemove', moverArrasto);
        window.removeEventListener('touchmove', moverArrasto);
    }

    function verificarFisica() {
        const o1 = document.getElementById('obj1');
        const o2 = document.getElementById('obj2');
        if(!o1 || !o2) return;

        const r1 = o1.getBoundingClientRect();
        const r2 = o2.getBoundingClientRect();
        const colidindo = !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);

        if (modo === 'atrito' && colidindo && distanciaPercorrida > 500) {
            o1.dataset.q = 5; o1.style.backgroundColor = '#ef4444';
            o2.dataset.q = -5; o2.style.backgroundColor = '#3b82f6';
            o1.querySelector('.carga-txt').innerText = '+5';
            o2.querySelector('.carga-txt').innerText = '-5';
            document.getElementById('texto').innerText = "✅ Eletrizados por atrito!";
        }

        if (modo === 'contato' && colidindo) {
            let q1 = parseFloat(o1.dataset.q);
            let q2 = parseFloat(o2.dataset.q);
            if (q1 !== q2) {
                let media = (q1 + q2) / 2;
                o1.dataset.q = o2.dataset.q = media;
                o1.style.backgroundColor = o2.style.backgroundColor = '#f97316';
                o1.querySelector('.carga-txt').innerText = media.toFixed(1);
                o2.querySelector('.carga-txt').innerText = media.toFixed(1);
                document.getElementById('texto').innerText = "✅ Equilíbrio de cargas atingido!";
            }
        }

        if (modo === 'inducao') {
            const d = Math.abs((r1.left + r1.width/2) - (r2.left + r2.width/2));
            if (d < 100) {
                o2.innerHTML = `<div class="carga-txt">POLARIZADA</div><div style="display:flex; gap:15px"><span style="color:#ef4444">+</span><span style="color:#3b82f6">-</span></div>`;
                o2.style.borderColor = '#fbbf24';
            } else {
                o2.innerHTML = `<div class="carga-txt">NEUTRA</div>`;
                o2.style.borderColor = '#fff';
            }
        }
    }

    window.onload = resetar;
</script>
</body>
</html>
