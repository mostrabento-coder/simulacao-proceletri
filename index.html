<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Física Mobile</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        :root { --fundo: #0f172a; --card: #1e293b; --acento: #fbbf24; }
        
        body { 
            background: var(--fundo); color: white; font-family: system-ui, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Menu fixo no topo */
        .menu { display: flex; width: 100%; gap: 2px; padding: 5px; background: #0f172a; }
        .tab { 
            flex: 1; padding: 12px 5px; border: none; background: #334155; color: #94a3b8; 
            border-radius: 8px; font-weight: bold; font-size: 0.75rem; transition: 0.2s;
        }
        .tab.ativa { background: var(--acento); color: #000; }

        /* Área Principal */
        .container { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        
        .palco { 
            flex: 1; /* Ocupa o espaço disponível */
            background: #000; border-radius: 12px; position: relative; 
            border: 2px solid #334155; overflow: hidden; touch-action: none;
        }
        
        /* Elementos */
        .obj { 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            border: 2px solid #fff; transition: background 0.3s; touch-action: none; z-index: 10;
        }
        .esfera { width: 65px; height: 65px; border-radius: 50%; }
        .retangulo { width: 100px; height: 35px; border-radius: 6px; }
        
        /* Labels e Instruções */
        .carga-txt { 
            position: absolute; top: -25px; white-space: nowrap;
            color: var(--acento); font-size: 11px; font-weight: bold;
            background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px;
        }
        
        .info-panel { 
            background: var(--card); padding: 12px; border-radius: 12px; 
            font-size: 0.85rem; border-bottom: 4px solid var(--acento);
        }
        
        button.reset-btn {
            width: 100%; padding: 10px; margin-top: 8px; background: #475569;
            color: white; border: none; border-radius: 6px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="menu">
        <button id="btn-atrito" class="tab ativa" onclick="mudarModo('atrito')">ATRITO</button>
        <button id="btn-contato" class="tab" onclick="mudarModo('contato')">CONTATO</button>
        <button id="btn-inducao" class="tab" onclick="mudarModo('inducao')">INDUÇÃO</button>
    </div>

    <div class="container">
        <div class="palco" id="palco"></div>
        
        <div class="info-panel">
            <strong id="titulo">Atrito</strong>
            <p id="texto" style="margin: 5px 0 0 0;">Arraste os itens para interagir.</p>
            <button class="reset-btn" onclick="resetar()">🔄 Reiniciar</button>
        </div>
    </div>

<script>
    let modo = 'atrito';
    let ativo = null;
    let offset = { x: 0, y: 0 };
    let distAtrito = 0;
    let lastX = 0;

    function mudarModo(m) {
        modo = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativa'));
        document.getElementById('btn-' + m).classList.add('ativa');
        resetar();
    }

    function criarObj(id, xPercent, yPercent, classe, cor, carga, label) {
        const palco = document.getElementById('palco');
        const div = document.createElement('div');
        div.id = id;
        div.className = 'obj ' + classe;
        div.style.backgroundColor = cor;
        div.dataset.q = carga;
        
        // Posicionamento inteligente baseado em porcentagem do palco
        const pRect = palco.getBoundingClientRect();
        div.style.left = (pRect.width * xPercent / 100) + 'px';
        div.style.top = (pRect.height * yPercent / 100) + 'px';

        div.innerHTML = `<div class="carga-txt">${label}</div><span class="val">${carga != 0 ? (carga > 0 ? '+'+carga : carga) : ''}</span>`;
        
        div.addEventListener('mousedown', start);
        div.addEventListener('touchstart', start, {passive: false});
        
        palco.appendChild(div);
    }

    function resetar() {
        const palco = document.getElementById('palco');
        palco.innerHTML = '';
        distAtrito = 0;
        const T = document.getElementById('titulo');
        const txt = document.getElementById('texto');

        if(modo === 'atrito') {
            T.innerText = "⚡ Eletrização por Atrito";
            txt.innerText = "Esfregue o BALÃO no CASACO repetidamente.";
            criarObj('obj1', 15, 40, 'retangulo', '#64748b', 0, 'CASACO');
            criarObj('obj2', 60, 40, 'esfera', '#475569', 0, 'BALÃO');
        } else if(modo === 'contato') {
            T.innerText = "⚡ Eletrização por Contato";
            txt.innerText = "Toque a esfera VERMELHA na CINZA.";
            criarObj('obj1', 15, 40, 'esfera', '#ef4444', 10, '+10');
            criarObj('obj2', 60, 40, 'esfera', '#64748b', 0, '0');
        } else if(modo === 'inducao') {
            T.innerText = "⚡ Indução";
            txt.innerText = "Aproxime o bastão da esfera sem tocar.";
            criarObj('obj1', 10, 45, 'retangulo', '#3b82f6', -10, 'NEGATIVO');
            criarObj('obj2', 65, 40, 'esfera', '#64748b', 0, 'NEUTRA');
        }
    }

    function start(e) {
        e.preventDefault();
        ativo = this;
        const evt = e.type === 'touchstart' ? e.touches[0] : e;
        const rect = ativo.getBoundingClientRect();
        offset.x = evt.clientX - rect.left;
        offset.y = evt.clientY - rect.top;
        lastX = evt.clientX;

        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('mouseup', stop);
        window.addEventListener('touchend', stop);
    }

    function move(e) {
        if(!ativo) return;
        const evt = e.type === 'touchmove' ? e.touches[0] : e;
        const palco = document.getElementById('palco').getBoundingClientRect();
        
        let x = evt.clientX - palco.left - offset.x;
        let y = evt.clientY - palco.top - offset.y;

        // Trava dentro do palco
        x = Math.max(0, Math.min(x, palco.width - ativo.offsetWidth));
        y = Math.max(0, Math.min(y, palco.height - ativo.offsetHeight));

        ativo.style.left = x + 'px';
        ativo.style.top = y + 'px';

        if(modo === 'atrito') distAtrito += Math.abs(evt.clientX - lastX);
        lastX = evt.clientX;

        checkPhysics();
    }

    function stop() { 
        ativo = null; 
        window.removeEventListener('mousemove', move);
        window.removeEventListener('touchmove', move);
    }

    function checkPhysics() {
        const o1 = document.getElementById('obj1'), o2 = document.getElementById('obj2');
        if(!o1 || !o2) return;
        const r1 = o1.getBoundingClientRect(), r2 = o2.getBoundingClientRect();
        const touch = !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);

        if(modo === 'atrito' && touch && distAtrito > 600) {
            o1.style.backgroundColor = '#ef4444'; o1.querySelector('.carga-txt').innerText = '+5';
            o2.style.backgroundColor = '#3b82f6'; o2.querySelector('.carga-txt').innerText = '-5';
            document.getElementById('texto').innerText = "✅ Sucesso! Elétrons transferidos.";
        }
        if(modo === 'contato' && touch) {
            let media = (parseFloat(o1.dataset.q) + parseFloat(o2.dataset.q)) / 2;
            o1.dataset.q = o2.dataset.q = media;
            o1.style.backgroundColor = o2.style.backgroundColor = '#f97316';
            o1.querySelector('.carga-txt').innerText = o2.querySelector('.carga-txt').innerText = media.toFixed(1);
            document.getElementById('texto').innerText = "✅ Cargas equilibradas!";
        }
        if(modo === 'inducao') {
            const dist = Math.abs((r1.left + r1.width/2) - (r2.left + r2.width/2));
            if(dist < 110) {
                o2.innerHTML = `<div class="carga-txt">POLARIZADA</div><div style="display:flex;gap:10px;font-weight:bold"><span style="color:#f87171">+</span><span style="color:#60a5fa">-</span></div>`;
                o2.style.borderColor = '#fbbf24';
            } else {
                o2.innerHTML = `<div class="carga-txt">NEUTRA</div>`;
                o2.style.borderColor = '#fff';
            }
        }
    }

    window.onload = resetar;
    window.onresize = resetar; // Recalcula posições se girar o celular
</script>
</body>
</html>
