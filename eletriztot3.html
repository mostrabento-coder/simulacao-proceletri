<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Eletrização Completo</title>
    <style>
        :root { --fundo: #0f172a; --card: #1e293b; --acento: #fbbf24; }
        body { background: var(--fundo); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Menu Superior */
        .menu { display: flex; width: 100%; max-width: 800px; gap: 5px; margin-top: 10px; }
        .tab { flex: 1; padding: 15px; border: none; background: #334155; color: #94a3b8; cursor: pointer; border-radius: 8px 8px 0 0; font-weight: bold; }
        .tab.ativa { background: var(--card); color: var(--acento); border-bottom: 3px solid var(--acento); }


        /* Área de Jogo */
        .container { width: 100%; max-width: 800px; background: var(--card); padding: 20px; border-radius: 0 0 15px 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .palco { height: 300px; background: #000; border-radius: 10px; position: relative; border: 2px solid #334155; overflow: hidden; touch-action: none; }
        
        /* Elementos Visuais */
        .obj { position: absolute; cursor: grab; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; transition: background 0.3s; border: 2px solid #fff; }
        .esfera { width: 80px; height: 80px; border-radius: 50%; }
        .retangulo { width: 120px; height: 40px; border-radius: 5px; }
        
        /* Instruções */
        .instrucoes { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid var(--acento); }
        .carga-txt { position: absolute; top: -25px; width: 100%; text-align: center; color: var(--acento); font-family: monospace; }
    </style>
</head>
<body>


    <div class="menu">
        <button id="btn-atrito" class="tab ativa" onclick="mudarModo('atrito')">ATRITO</button>
        <button id="btn-contato" class="tab" onclick="mudarModo('contato')">CONTATO</button>
        <button id="btn-inducao" class="tab" onclick="mudarModo('inducao')">INDUÇÃO</button>
    </div>


    <div class="container">
        <div class="palco" id="palco"></div>
        
        <div class="instrucoes">
            <h3 id="titulo" style="margin-top:0">Atrito</h3>
            <p id="texto">Arraste o balão e esfregue-o no casaco para transferir elétrons.</p>
            <button onclick="resetar()" style="padding:10px; cursor:pointer; background:#475569; color:white; border:none; border-radius:5px;">Reiniciar Simulação</button>
        </div>
    </div>


<script>
    let modo = 'atrito';
    let ativo = null;
    let ultimaX = 0, distPercorrida = 0;


    function mudarModo(m) {
        modo = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativa'));
        document.getElementById('btn-' + m).classList.add('ativa');
        resetar();
    }


    function resetar() {
        const palco = document.getElementById('palco');
        palco.innerHTML = '';
        const titulo = document.getElementById('titulo');
        const texto = document.getElementById('texto');
        distPercorrida = 0;


        if(modo === 'atrito') {
            titulo.innerText = "Eletrização por Atrito";
            texto.innerText = "Mova o balão rapidamente sobre o casaco. Veja as cargas mudarem!";
            criarObj('obj1', 100, 100, 'retangulo', '#64748b', 0, 'CASACO');
            criarObj('obj2', 300, 110, 'esfera', '#64748b', 0, 'BALÃO');
        } 
        else if(modo === 'contato') {
            titulo.innerText = "Eletrização por Contato";
            texto.innerText = "Encoste a esfera vermelha (+10) na esfera cinza (0).";
            criarObj('obj1', 100, 110, 'esfera', '#ef4444', 10, '+10');
            criarObj('obj2', 600, 110, 'esfera', '#64748b', 0, '0');
        }
        else if(modo === 'inducao') {
            titulo.innerText = "Eletrização por Indução";
            texto.innerText = "Aproxime o bastão negativo da esfera neutra sem tocar.";
            criarObj('obj1', 50, 130, 'retangulo', '#3b82f6', -10, '- - -');
            criarObj('obj2', 500, 110, 'esfera', '#64748b', 0, 'NEUTRA');
        }
    }


    function criarObj(id, x, y, classe, cor, carga, txt) {
        const div = document.createElement('div');
        div.id = id;
        div.className = 'obj ' + classe;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.backgroundColor = cor;
        div.dataset.q = carga;
        div.innerHTML = `<div class="carga-txt">${txt}</div><span id="label-${id}">${carga === 0 ? '' : (carga > 0 ? '+' : '-') }</span>`;
        
        div.onmousedown = div.ontouchstart = (e) => { 
            ativo = div; 
            div.style.zIndex = 1000;
            ultimaX = e.clientX || e.touches[0].clientX;
        };
        
        document.getElementById('palco').appendChild(div);
    }


    window.onmousemove = window.ontouchmove = (e) => {
        if(!ativo) return;
        const palcoRect = document.getElementById('palco').getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        
        let x = clientX - palcoRect.left - (ativo.offsetWidth / 2);
        let y = clientY - palcoRect.top - (ativo.offsetHeight / 2);
        
        ativo.style.left = x + 'px';
        ativo.style.top = y + 'px';


        processarFisica();
        distPercorrida += Math.abs(clientX - ultimaX);
        ultimaX = clientX;
    };


    window.onmouseup = window.ontouchend = () => { ativo = null; };


    function processarFisica() {
        const o1 = document.getElementById('obj1');
        const o2 = document.getElementById('obj2');
        if(!o1 || !o2) return;


        const r1 = o1.getBoundingClientRect();
        const r2 = o2.getBoundingClientRect();
        const estaoTocando = !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);


        if(modo === 'atrito' && estaoTocando && distPercorrida > 500) {
            o1.dataset.q = 5; o1.style.backgroundColor = '#ef4444'; o1.querySelector('.carga-txt').innerText = '+5';
            o2.dataset.q = -5; o2.style.backgroundColor = '#3b82f6'; o2.querySelector('.carga-txt').innerText = '-5';
        }


        if(modo === 'contato' && estaoTocando) {
            const media = (parseFloat(o1.dataset.q) + parseFloat(o2.dataset.q)) / 2;
            o1.dataset.q = o2.dataset.q = media;
            o1.style.backgroundColor = o2.style.backgroundColor = '#f97316';
            o1.querySelector('.carga-txt').innerText = o2.querySelector('.carga-txt').innerText = '+' + media.toFixed(1);
        }


        if(modo === 'inducao') {
            const dist = Math.abs(r1.right - r2.left);
            if(dist < 50) {
                o2.innerHTML = `<div class="carga-txt">POLARIZADA</div><div style="display:flex; justify-content:space-around; width:100%"><span style="color:red">+</span><span style="color:blue">-</span></div>`;
            } else {
                o2.innerHTML = `<div class="carga-txt">NEUTRA</div>`;
            }
        }
    }


    window.onload = resetar;
</script>
</body>
</html>
